<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinXAI - Real-Time AI Diagnosis</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Fixed Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Scrollable UI Container -->
    <div id="app-ui">

        <!-- Navbar -->
        <nav>
            <div class="logo">ClinXAI</div>
            <div class="status-indicator" id="system-status">System Ready</div>
        </nav>



        <!-- 2. Diagnosis Page -->
        <section id="diagnose-page" class="active-section">
            <div class="container glass-panel">
                <h2>Patient Data Entry</h2>

                <div class="form-grid">
                    <!-- Image Upload -->
                    <div class="upload-area" id="drop-zone">
                        <input type="file" id="file-input" accept="image/*" hidden>
                        <div class="preview-container" id="preview-container">
                            <img id="image-preview" src="" alt="X-ray Preview">
                            <div class="overlay-text">Click or Drop X-ray Here</div>
                        </div>
                    </div>

                    <!-- Symptoms Form -->
                    <div class="symptoms-form">
                        <div class="input-group">
                            <label>Age</label>
                            <input type="number" id="inp-age" value="45" min="0" max="120">
                        </div>
                        <div class="input-group">
                            <label>Gender</label>
                            <select id="inp-gender">
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Oxygen Level (%)</label>
                            <input type="number" id="inp-oxygen" value="95" min="50" max="100">
                        </div>
                        <div class="toggle-group">
                            <label class="toggle">
                                <input type="checkbox" id="inp-fever">
                                <span class="slider"></span>
                                <span class="label-text">Fever</span>
                            </label>
                            <label class="toggle">
                                <input type="checkbox" id="inp-cough">
                                <span class="slider"></span>
                                <span class="label-text">Cough</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="action-area">
                    <button id="btn-analyze" class="primary-btn action-btn">RUN DIAGNOSIS</button>
                </div>
            </div>
        </section>

        <!-- 3. Result Page -->
        <section id="result-page" class="hidden-section">
            <div class="container glass-panel result-layout">
                <div class="header-result">
                    <button id="btn-reset" class="secondary-btn">← New Analysis</button>
                    <h2 id="res-diagnosis">PNEUMONIA DETECTED</h2>
                </div>

                <div class="result-grid">
                    <!-- Confidence Orb Placeholder (Handled by Three.js in bg, but we might want a container here if not full BG) -->
                    <!-- Actually for Phase 5 we use BG. Here we show numeric data -->

                    <div class="confidence-card">
                        <h3>AI Confidence</h3>
                        <div class="confidence-value" id="res-confidence">98.5%</div>
                        <div class="risk-badge" id="res-risk">HIGH RISK</div>
                        <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">
                            * Risk assesses uncertainty level.<br>
                            Diagnosis is strictly based on >50% probability.
                        </p>
                    </div>

                    <!-- Visual Explanation -->
                    <div class="xai-card">
                        <h3>Visual Attention (Grad-CAM)</h3>
                        <div class="heatmap-container">
                            <img id="res-heatmap" src="" alt="AI Attention Map">
                        </div>
                    </div>

                    <!-- Feature Explanation -->
                    <div class="shap-card">
                        <h3>Key Risk Factors (SHAP)</h3>
                        <div id="shap-bars" class="bar-chart">
                            <!-- Bars injected by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/three-scene.js"></script>
</body>

</html>
